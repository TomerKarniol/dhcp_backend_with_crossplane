{{- if and .Values.dhcp_values .Values.dhcp_values.network .Values.dhcp_values.gateway -}}
apiVersion: http.crossplane.io/v1alpha2
kind: Request
metadata:
  name: dhcp-scope-{{ .Values.dhcp_values.scopeName | lower | replace " " "-" | replace "_" "-" }}-{{ .Values.dhcp_values.network | replace "." "-" }}
  namespace: {{ .Values.crossplane.namespace | default "crossplane-system" }}
spec:
  deletionPolicy: Delete
  providerConfigRef:
    name: dhcp-http
  forProvider:
    headers:
      Content-Type:
        - "application/json"
      Accept:
        - "application/json"

    {{- with .Values.apiServer.tokenSecretRef }}
    {{- if and .name .namespace .key }}
    secretInjectionConfigs:
      - secretRef:
          name: {{ .name }}
          namespace: {{ .namespace }}
          key: {{ .key }}
        toFieldPath: "headers.Authorization[0]"
        format: "Bearer %v"
    {{- end }}
    {{- end }}

    payload:
      baseUrl: "{{ .Values.apiServer.url }}/api/v1/scopes"
      body:
        {{- include "dhcp.payload" . | nindent 8 }}

    mappings:
      - method: "POST"
        url: (.payload.baseUrl + "/" + .payload.body.network)
        body: .payload.body

      - method: "GET"
        url: (.payload.baseUrl + "/" + .payload.body.network)

      - method: "PUT"
        url: (.payload.baseUrl + "/" + .payload.body.network)
        body: .payload.body

      - method: "DELETE"
        url: (.payload.baseUrl + "/" + .payload.body.network)
{{- end }}